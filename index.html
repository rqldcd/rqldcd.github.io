<title>部落阵型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;transition:background .2s,color .2s,border-color .2s,backdrop-filter .2s}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei",sans-serif;min-height:100vh;padding-bottom:60px;line-height:1.4}
[data-theme="light"]{--bg:#f5f7fb;--bg-gradient:linear-gradient(125deg,#f0f2f5,#e6e9f0);--glass-bg:rgba(255,255,255,0.75);--glass-border:rgba(0,0,0,0.1);--glass-shadow:0 8px 24px rgba(0,0,0,0.05),0 1px 2px rgba(0,0,0,0.03);--card-blur:blur(12px);--backdrop-blur:blur(16px);--text-primary:#111827;--text-muted:#4b5563;--btn-open-bg:#1f2937;--btn-open-color:#fff;--btn-open-hover:#111827;--accent:#000;--accent-hover:#333;--accent-glow:0 0 6px rgba(0,0,0,0.2);--btn-glass:rgba(0,0,0,0.05);--btn-glass-hover:rgba(0,0,0,0.1);--tag-bg:rgba(0,0,0,0.08);--tag-color:#4b5563;--toast-bg:rgba(255,255,255,0.95);--toast-color:#111827;--toast-border:rgba(0,0,0,0.15);--card-tag-bg:rgba(0,0,0,0.75);--card-tag-color:#fff}
[data-theme="dark"]{--bg:#0a0f2a;--bg-gradient:radial-gradient(circle at 10% 20%,#0a0f2a,#030617);--glass-bg:rgba(20,20,40,0.35);--glass-border:rgba(255,255,255,0.18);--glass-shadow:0 8px 28px rgba(0,0,0,0.35),0 0 0 0.5px rgba(255,255,255,0.08) inset;--card-blur:blur(16px);--backdrop-blur:blur(18px);--text-primary:#f0f3fa;--text-muted:#b9c3e6;--btn-open-bg:#facc15;--btn-open-color:#0a0f1f;--btn-open-hover:#ffe484;--accent:#facc15;--accent-hover:#ffe484;--accent-glow:0 0 8px rgba(250,204,21,0.5);--btn-glass:rgba(255,255,255,0.12);--btn-glass-hover:rgba(255,255,255,0.25);--tag-bg:rgba(255,255,255,0.1);--tag-color:#b9c3e6;--toast-bg:rgba(0,0,0,0.85);--toast-color:#facc15;--toast-border:rgba(250,204,21,0.4);--card-tag-bg:rgba(0,0,0,0.7);--card-tag-color:#facc15}
body{background:var(--bg);background-image:var(--bg-gradient);background-attachment:fixed;color:var(--text-primary)}
[data-theme="dark"] body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 70% 30%,rgba(120,80,200,0.2),transparent 60%);pointer-events:none;z-index:-1}
.header{background:var(--glass-bg);backdrop-filter:var(--backdrop-blur);border-bottom:1px solid var(--glass-border);padding:12px 20px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.logo-text{font-size:20px;font-weight:600;background:linear-gradient(135deg,var(--text-primary),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
.theme-toggle{background:transparent;border:none;cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--text-primary);transition:all .2s ease}.theme-toggle:hover{opacity:.7;transform:scale(.96)}
.theme-toggle svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none}
.search-box{padding:16px 18px 10px}.search-box input{width:100%;padding:12px 20px;border-radius:48px;background:var(--glass-bg);backdrop-filter:var(--backdrop-blur);border:1px solid var(--glass-border);color:var(--text-primary);font-size:15px;box-shadow:var(--glass-shadow)}.search-box input::placeholder{color:var(--text-muted);opacity:.6}.search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow),var(--glass-shadow)}
.filter-bar{display:flex;overflow-x:auto;gap:12px;padding:12px 18px 18px;scrollbar-width:thin}.filter-btn{flex-shrink:0;background:var(--glass-bg);backdrop-filter:var(--backdrop-blur);border:1px solid var(--glass-border);color:var(--text-primary);padding:7px 20px;border-radius:40px;font-size:13px;font-weight:500;cursor:pointer}.filter-btn.active{background:var(--accent);color:#111;border-color:var(--accent);box-shadow:var(--accent-glow)}[data-theme="light"] .filter-btn.active{color:#fff}.filter-btn:hover:not(.active){background:var(--btn-glass-hover);transform:scale(1.02)}.filter-status{text-align:center;font-size:12px;color:var(--text-muted);margin:-6px 0 12px}
.container{padding:0 16px;max-width:1300px;margin:0 auto}.card-list{display:grid;grid-template-columns:1fr;gap:22px}@media(min-width:640px){.card-list{grid-template-columns:repeat(2,1fr)}}@media(min-width:1100px){.card-list{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--glass-bg);backdrop-filter:var(--card-blur);border:1px solid var(--glass-border);border-radius:28px;overflow:hidden;position:relative;box-shadow:var(--glass-shadow);transition:transform .25s,box-shadow .3s}.card:hover{transform:translateY(-4px);box-shadow:0 18px 36px rgba(0,0,0,0.2),0 0 0 1px rgba(255,255,255,0.1) inset}.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,200,0.4),transparent);pointer-events:none}
.card-img{width:100%;aspect-ratio:16/10;background:rgba(0,0,0,0.2);overflow:hidden}.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}.card:hover .card-img img{transform:scale(1.02)}
.card-body{padding:16px 18px 20px}.card-title{font-size:18px;font-weight:600;margin-bottom:6px}.update-time{font-size:12px;color:var(--text-muted);margin-bottom:14px}.card-footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.tag{font-size:12px;background:var(--tag-bg);padding:4px 12px;border-radius:40px;color:var(--tag-color)}.open-btn,.copy-btn{text-decoration:none;padding:6px 16px;border-radius:32px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}.copy-btn{background:var(--btn-glass);color:var(--text-primary);border:1px solid var(--glass-border)}.copy-btn:hover{background:var(--btn-glass-hover);transform:scale(.96)}.open-btn{background:var(--btn-open-bg);color:var(--btn-open-color);border:none}.open-btn:hover{background:var(--btn-open-hover);transform:scale(.96);box-shadow:var(--accent-glow)}
.card-tag{position:absolute;top:14px;right:14px;font-size:11px;font-weight:600;padding:4px 12px;border-radius:30px;background:var(--card-tag-bg);backdrop-filter:blur(8px);color:var(--card-tag-color);border:1px solid var(--glass-border);z-index:2}.card.no-image .card-img{display:none}.card.no-image .card-body{background:radial-gradient(circle at 10% 20%,rgba(0,0,0,0.03),transparent)}
.stat{text-align:center;font-size:13px;color:var(--text-muted);margin:28px 0 12px}.pagination{display:flex;justify-content:center;gap:10px;margin:28px 0 20px;flex-wrap:wrap}.page-btn{padding:6px 16px;border-radius:40px;background:var(--glass-bg);backdrop-filter:var(--backdrop-blur);border:1px solid var(--glass-border);color:var(--text-primary);font-size:13px;cursor:pointer}.page-btn.active{background:var(--accent);color:#111;border-color:var(--accent)}[data-theme="light"] .page-btn.active{color:#fff}.page-btn.disabled{opacity:.4;cursor:default}.page-btn:hover:not(.disabled):not(.active){background:var(--btn-glass-hover)}
.history{margin-top:44px;background:var(--glass-bg);backdrop-filter:blur(20px);border-radius:32px;padding:16px 20px;border:1px solid var(--glass-border);box-shadow:var(--glass-shadow)}.history-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}.history-title{font-size:14px;font-weight:500;color:var(--text-muted)}.clear-btn{font-size:12px;background:none;border:none;color:var(--text-muted);cursor:pointer;opacity:.7}.clear-btn:hover{opacity:1;color:var(--accent)}.history-list{display:flex;flex-wrap:wrap;gap:12px}.history-item{background:var(--btn-glass);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:40px;padding:6px 18px;font-size:13px;cursor:pointer;transition:all .2s}.history-item:hover{background:var(--accent);color:#111;border-color:var(--accent);transform:translateY(-2px)}[data-theme="light"] .history-item:hover{color:#fff}.history-item-placeholder{background:var(--btn-glass);backdrop-filter:blur(8px);border:1px solid var(--glass-border);border-radius:40px;padding:6px 18px;font-size:13px;color:var(--text-muted);cursor:default;pointer-events:none;opacity:.7}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) scale(0.9);background:var(--toast-bg);backdrop-filter:blur(24px);color:var(--toast-color);padding:10px 24px;border-radius:60px;font-size:14px;font-weight:500;opacity:0;transition:opacity .2s,transform .2s;z-index:9999;pointer-events:none;border:1px solid var(--toast-border);white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
#backTop{position:fixed;bottom:24px;right:20px;width:44px;height:44px;border-radius:44px;background:var(--glass-bg);backdrop-filter:blur(12px);color:var(--accent);border:1px solid var(--glass-border);font-size:22px;cursor:pointer;z-index:999;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}#backTop.visible{opacity:1;pointer-events:auto}
.empty-state{text-align:center;padding:56px 20px;color:var(--text-muted);background:var(--glass-bg);border-radius:48px;backdrop-filter:blur(12px)}
</style>

<div class="search-box">

</div>

<div class="toast" id="toastMsg">✨ 已复制链接</div>

<script>
// 阵型数据

// 全局变量
let currentPage = 1, searchKeyword = "", activeFilter = "全部";
let historyNames = JSON.parse(localStorage.getItem("history") || "[]");
const PAGE_SIZE = 12;

// DOM 元素
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const searchInput = $("#searchInput"), filterBar = $("#filterBar"), listContainer = $("#list");
const historyListEl = $("#historyList"), statEl = $("#stat"), paginationDiv = $("#pagination");
const backTopBtn = $("#backTop"), toastMsg = $("#toastMsg");
const iconSun = $("#iconSun"), iconMoon = $("#iconMoon");

// 主题
function setTheme(theme){
  document.body.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
  if(theme === "dark"){
    iconSun.style.display = "none";
    iconMoon.style.display = "block";
  } else {
    iconSun.style.display = "block";
    iconMoon.style.display = "none";
  }
}
function initTheme(){
  const saved = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  setTheme(saved);
}
$("#themeToggle").onclick = () => setTheme(document.body.getAttribute("data-theme") === "dark" ? "light" : "dark");
initTheme();

// 工具
function escapeHtml(s){return s.replace(/[&<>]/g,m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));}
function showToast(msg){toastMsg.textContent=msg;toastMsg.classList.add("show");setTimeout(()=>toastMsg.classList.remove("show"),2000);}
function copyToClipboard(text){navigator.clipboard.writeText(text).then(()=>showToast("链接已复制")).catch(()=>showToast("复制失败"));}
function scrollToTop(){window.scrollTo({top:0,behavior:"smooth"});}
function scrollToCard(cardId){const c=document.getElementById(cardId);if(c){c.scrollIntoView({behavior:"smooth",block:"center"});c.style.boxShadow="0 0 0 3px var(--accent), var(--glass-shadow)";setTimeout(()=>c.style.boxShadow="",800);}}

// 筛选与分页逻辑
function getFiltered(){
  let f=layouts.filter(l=>{
    const tagMatch=activeFilter==="全部"?true:activeFilter==="图片"?l.image===true:activeFilter==="无图"?l.image===false:l.th===activeFilter;
    const kw=searchKeyword.trim().toLowerCase();
    const kwMatch=!kw||l.name.toLowerCase().includes(kw)||l.th.toLowerCase().includes(kw);
    return tagMatch&&kwMatch;
  });
  f.sort((a,b)=>new Date(b.update)-new Date(a.update));
  return f;
}

function render(opt={scrollToTop:false}){
  const filtered=getFiltered();
  const total=filtered.length, totalPages=Math.ceil(total/PAGE_SIZE);
  if(currentPage>totalPages&&totalPages>0) currentPage=totalPages;
  if(currentPage<1) currentPage=1;
  const start=(currentPage-1)*PAGE_SIZE;
  const pageData=filtered.slice(start,start+PAGE_SIZE);
  statEl.textContent=`共 ${total} 个阵型`;
  if(!total){
    listContainer.innerHTML=`<div class="empty-state">没有找到相关阵型，试试其他关键词</div>`;
    paginationDiv.innerHTML="";
    if(opt.scrollToTop) scrollToTop();
    return;
  }
  listContainer.innerHTML=pageData.map(l=>{
    const id=`layout-${l.name.replace(/\s+/g,'-').replace(/[^\w-]/g,'')}`;
    const hasImg=l.image===true;
    const imgHtml=hasImg?`<div class="card-img"><img src="${l.img}" alt="${l.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/20/800/500'"></div>`:"";
    const tagType=hasImg?"图片":"无图";
    const cardClass=hasImg?"card":"card no-image";
    return `<div class="${cardClass}" id="${id}">
      ${imgHtml}
      <div class="card-tag">${tagType}</div>
      <div class="card-body">
        <div class="card-title">${escapeHtml(l.name)}</div>
        <div class="update-time">更新：${l.update}</div>
        <div class="card-footer">
          <span class="tag">${l.th}</span>
          <div style="display:flex; gap:8px;">
            <button class="copy-btn" data-link="${l.link}">复制链接</button>
            <a href="${l.link}" target="_blank" class="open-btn" data-name="${escapeHtml(l.name)}">打开阵型</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
  $$(".copy-btn").forEach(btn=>btn.onclick=(e)=>{e.stopPropagation();copyToClipboard(btn.dataset.link);});
  $$(".open-btn").forEach(link=>link.onclick=()=>addHistory(link.dataset.name));
  // 分页
  paginationDiv.innerHTML="";
  if(totalPages>1){
    const prev=document.createElement("button");prev.textContent="← 上一页";prev.className=`page-btn ${currentPage===1?"disabled":""}`;prev.onclick=()=>{if(currentPage>1){currentPage--;render({scrollToTop:true});}};paginationDiv.appendChild(prev);
    let startPage=Math.max(1,currentPage-2),endPage=Math.min(totalPages,startPage+4);
    if(endPage-startPage<4) startPage=Math.max(1,endPage-4);
    for(let i=startPage;i<=endPage;i++){const btn=document.createElement("button");btn.textContent=i;btn.className=`page-btn ${i===currentPage?"active":""}`;btn.onclick=()=>{currentPage=i;render({scrollToTop:true});};paginationDiv.appendChild(btn);}
    const next=document.createElement("button");next.textContent="下一页 →";next.className=`page-btn ${currentPage===totalPages?"disabled":""}`;next.onclick=()=>{if(currentPage<totalPages){currentPage++;render({scrollToTop:true});}};paginationDiv.appendChild(next);
  }
  renderHistory();
  $("#filterStatus").textContent=searchKeyword.trim()?`筛选：${activeFilter}  ·  关键词：“${searchKeyword}”`:`当前筛选：${activeFilter}`;
  if(opt.scrollToTop) scrollToTop();
}

// 历史记录
function addHistory(name){
  historyNames=historyNames.filter(n=>n!==name);
  historyNames.unshift(name);
  if(historyNames.length>6) historyNames.pop();
  localStorage.setItem("history",JSON.stringify(historyNames));
  renderHistory();
}
function renderHistory(){
  if(!historyListEl) return;
  if(!historyNames.length){historyListEl.innerHTML=`<div class="history-item-placeholder">暂无浏览记录</div>`;return;}
  historyListEl.innerHTML=historyNames.map(name=>`<div class="history-item" data-hist-name="${escapeHtml(name)}">${escapeHtml(name)}</div>`).join("");
  $$(".history-item[data-hist-name]").forEach(el=>el.onclick=()=>{
    const target=layouts.find(l=>l.name===el.dataset.histName);
    if(target) jumpToLayout(target);
  });
}
function jumpToLayout(layout){
  activeFilter=layout.th; searchKeyword=layout.name; searchInput.value=layout.name;
  $$(".filter-btn").forEach(btn=>btn.classList.toggle("active",btn.textContent===layout.th));
  currentPage=1;
  render({scrollToTop:false});
  setTimeout(()=>scrollToCard(`layout-${layout.name.replace(/\s+/g,'-').replace(/[^\w-]/g,'')}`),100);
}
$("#clearHistoryBtn").onclick=()=>{historyNames=[];localStorage.removeItem("history");renderHistory();showToast("历史记录已清除");};

// 筛选栏构建
function buildFilters(){
  const thSet=new Set(layouts.map(l=>l.th));
  const sortedTH=Array.from(thSet).sort((a,b)=>parseInt(b.replace("TH",""))-parseInt(a.replace("TH","")));
  const filters=["全部",...sortedTH,"图片","无图"];
  filterBar.innerHTML="";
  filters.forEach(tag=>{
    const btn=document.createElement("button");
    btn.className=`filter-btn${tag===activeFilter?" active":""}`;
    btn.textContent=tag;
    btn.onclick=()=>{
      if(tag!==activeFilter){searchKeyword="";searchInput.value="";}
      activeFilter=tag; currentPage=1;
      $$(".filter-btn").forEach(b=>b.classList.remove("active"));
      btn.classList.add("active");
      render({scrollToTop:false});
    };
    filterBar.appendChild(btn);
  });
}
buildFilters();

// 搜索
let debounceTimer;
searchInput.oninput=e=>{clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>{searchKeyword=e.target.value;currentPage=1;render({scrollToTop:true});},280);};

// 返回顶部
window.onscroll=()=>backTopBtn.classList.toggle("visible",window.scrollY>300);
backTopBtn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"});

// 初始化
render({scrollToTop:false});
window.addEventListener("beforeunload",()=>localStorage.setItem("lastSearch",searchKeyword));
const savedSearch=localStorage.getItem("lastSearch");
if(savedSearch){searchKeyword=savedSearch;searchInput.value=savedSearch;render({scrollToTop:false});}
